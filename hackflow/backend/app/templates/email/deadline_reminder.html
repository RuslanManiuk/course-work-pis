<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deadline Reminder</title>
  <style>
    body { margin: 0; padding: 0; background: #0f1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .container { max-width: 560px; margin: 40px auto; background: #1a1d27; border-radius: 12px; overflow: hidden; border: 1px solid #2a2d3e; }
    .header { background: linear-gradient(135deg, #ff6b6b, #f7c948); padding: 32px 40px; }
    .header h1 { margin: 0; color: #fff; font-size: 24px; font-weight: 700; }
    .body { padding: 32px 40px; }
    .body p { color: #c8cad6; font-size: 15px; line-height: 1.6; margin: 0 0 16px; }
    .countdown { text-align: center; background: #0f1117; border-radius: 8px; padding: 20px; margin: 20px 0; border: 1px solid #2a2d3e; }
    .countdown .hours { font-size: 48px; font-weight: 800; color: #ff6b6b; line-height: 1; }
    .countdown .label { font-size: 13px; color: #555870; margin-top: 4px; }
    .hackathon-name { font-size: 18px; font-weight: 600; color: #fff; }
    .footer { padding: 20px 40px; border-top: 1px solid #2a2d3e; }
    .footer p { color: #555870; font-size: 12px; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⏰ Deadline Reminder</h1>
    </div>
    <div class="body">
      <p>Don't forget — the <strong style="color:#fff">{{ deadline_type }}</strong> deadline for:</p>
      <p class="hackathon-name">{{ hackathon_title }}</p>
      <p>is approaching fast.</p>
      <div class="countdown">
        <div class="hours">{{ hours_remaining }}h</div>
        <div class="label">remaining</div>
      </div>
      <p>Make sure your team submits before time runs out!</p>
    </div>
    <div class="footer">
      <p>You're receiving this because you're registered in a HackFlow hackathon.</p>
    </div>
  </div>
</body>
</html>
