<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Invitation</title>
  <style>
    body { margin: 0; padding: 0; background: #0f1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .container { max-width: 560px; margin: 40px auto; background: #1a1d27; border-radius: 12px; overflow: hidden; border: 1px solid #2a2d3e; }
    .header { background: linear-gradient(135deg, #6c63ff, #3ecfcf); padding: 32px 40px; }
    .header h1 { margin: 0; color: #fff; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .header p { margin: 6px 0 0; color: rgba(255,255,255,0.75); font-size: 14px; }
    .body { padding: 32px 40px; }
    .body p { color: #c8cad6; font-size: 15px; line-height: 1.6; margin: 0 0 20px; }
    .team-name { font-size: 22px; font-weight: 700; color: #fff; margin: 0 0 24px; }
    .cta { display: inline-block; background: #6c63ff; color: #fff; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-weight: 600; font-size: 15px; }
    .footer { padding: 20px 40px; border-top: 1px solid #2a2d3e; }
    .footer p { color: #555870; font-size: 12px; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>HackFlow</h1>
      <p>Hackathon automation platform</p>
    </div>
    <div class="body">
      <p>Hi there,</p>
      <p><strong style="color:#fff">{{ inviter_name }}</strong> has invited you to join their team on HackFlow:</p>
      <p class="team-name">🚀 {{ team_name }}</p>
      <p>Click the button below to accept the invitation and join the team.</p>
      <a href="{{ invite_link }}" class="cta">Accept Invitation</a>
    </div>
    <div class="footer">
      <p>If you didn't expect this invitation, you can safely ignore this email.</p>
    </div>
  </div>
</body>
</html>
