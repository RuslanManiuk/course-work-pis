<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Project Scored</title>
  <style>
    body { margin: 0; padding: 0; background: #0f1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .container { max-width: 560px; margin: 40px auto; background: #1a1d27; border-radius: 12px; overflow: hidden; border: 1px solid #2a2d3e; }
    .header { background: linear-gradient(135deg, #f7c948, #ff6b6b); padding: 32px 40px; }
    .header h1 { margin: 0; color: #fff; font-size: 24px; font-weight: 700; }
    .body { padding: 32px 40px; text-align: center; }
    .body p { color: #c8cad6; font-size: 15px; line-height: 1.6; margin: 0 0 16px; }
    .score-badge { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #f7c948, #ff6b6b); display: inline-flex; align-items: center; justify-content: center; margin: 20px auto; }
    .score-badge span { font-size: 32px; font-weight: 800; color: #fff; }
    .team-name { font-size: 20px; font-weight: 700; color: #fff; margin: 0 0 8px; }
    .footer { padding: 20px 40px; border-top: 1px solid #2a2d3e; }
    .footer p { color: #555870; font-size: 12px; margin: 0; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Scores Published 🏆</h1>
    </div>
    <div class="body">
      <p class="team-name">{{ team_name }}</p>
      <p>The judges have finished evaluating your project. Here's your final score:</p>
      <div class="score-badge">
        <span>{{ "%.1f"|format(avg_score) }}</span>
      </div>
      <p style="color:#f7c948; font-size:13px; margin-top: 4px;">out of 10</p>
      <p>Log in to HackFlow to see detailed feedback from each judge.</p>
    </div>
    <div class="footer">
      <p>HackFlow — Hackathon Automation Platform</p>
    </div>
  </div>
</body>
</html>
